<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDT Pre-Filling System — SSH + Docker Runtime</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15,23,42,0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; margin-bottom: 2rem; }
    svg { width: 100%; min-width: 1100px; display: block; }
    .nav-back { color: #38bdf8; text-decoration: none; font-size: 0.875rem; margin-bottom: 1rem; display: inline-block; }
    .nav-back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a class="nav-back" href="../index.html">← Back to Dashboard</a>
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>GDT Pre-Filling System — SSH + Docker Runtime</h1>
      </div>
      <p class="subtitle">Local workstation reachability into WEB-IWP and the Docker container lifecycle from your runbook</p>
    </div>
    <div class="diagram-container">
      <svg viewBox="0 0 1100 520">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">

            <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <rect x="40" y="60" width="260" height="120" rx="12" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="170" y="84" fill="white" font-size="12" font-weight="600" text-anchor="middle">Local Machine</text>

        <text x="170" y="120" fill="#22d3ee" font-size="9" text-anchor="middle">Bitvise SFTP available</text>

        <rect x="420" y="60" width="260" height="120" rx="12" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>

        <text x="550" y="102" fill="#94a3b8" font-size="9" text-anchor="middle">10.255.255.3:2232</text>
        <text x="550" y="120" fill="#fb7185" font-size="9" text-anchor="middle">dkweb deploy host</text>

        <rect x="420" y="220" width="260" height="120" rx="12" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="550" y="244" fill="white" font-size="12" font-weight="600" text-anchor="middle">Docker runtime</text>
        <text x="550" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">container name: pre-filing-app</text>
        <text x="550" y="280" fill="#fbbf24" font-size="9" text-anchor="middle">openjdk:21-jdk</text>

        <rect x="820" y="220" width="220" height="120" rx="12" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="930" y="244" fill="white" font-size="12" font-weight="600" text-anchor="middle">Verification</text>
        <text x="930" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">10.255.255.6:19002</text>
        <text x="930" y="280" fill="#a78bfa" font-size="9" text-anchor="middle">browser / tests</text>

        <line x1="300" y1="120" x2="418" y2="120" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="360" y="114" fill="#94a3b8" font-size="9" text-anchor="middle">ssh / scp</text>

        <line x1="550" y1="180" x2="550" y2="218" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="570" y="202" fill="#94a3b8" font-size="9">docker commands</text>

        <line x1="680" y1="280" x2="818" y2="280" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="750" y="274" fill="#94a3b8" font-size="9" text-anchor="middle">HTTP reachability</text>

        <text x="40" y="410" fill="white" font-size="10" font-weight="600">Login / Access</text>
        <rect x="40" y="420" width="1000" height="72" rx="10" fill="rgba(30,41,59,0.2)" stroke="#64748b" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="70" y="440" fill="#fb7185" font-size="11" font-weight="600">SSH</text>
        <text x="70" y="458" fill="#94a3b8" font-size="9">host: 10.255.255.3:2232</text>
        <text x="70" y="474" fill="#94a3b8" font-size="9">user: dkweb</text>
        <text x="240" y="440" fill="#22d3ee" font-size="11" font-weight="600">SFTP / Browser tools</text>
        <text x="240" y="458" fill="#94a3b8" font-size="9">upload / inspect files on WEB-IWP</text>
        <text x="520" y="440" fill="#fbbf24" font-size="11" font-weight="600">Docker CLI expectations</text>
        <text x="520" y="458" fill="#94a3b8" font-size="9">docker ps / logs / run</text>
        <text x="790" y="440" fill="#a78bfa" font-size="11" font-weight="600">End user verification</text>
        <text x="790" y="458" fill="#94a3b8" font-size="9">login test with 3298</text>
      </svg>
    </div>
  </div>
</body>
</html>
