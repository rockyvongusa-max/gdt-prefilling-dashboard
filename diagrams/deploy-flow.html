<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDT Pre-Filling System — Deploy Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      min-height: 100vh;
      padding: 2rem;
      color: white;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 1rem;
      border: 1px solid #1e293b;
      padding: 1.5rem;
      overflow-x: auto;
      margin-bottom: 2rem;
    }
    svg { width: 100%; min-width: 1100px; display: block; }
    .nav-back { color: #38bdf8; text-decoration: none; font-size: 0.875rem; margin-bottom: 1rem; display: inline-block; }
    .nav-back:hover { text-decoration: underline; }
    .legend-note {
      margin-top: 1rem;
      color: #94a3b8;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="nav-back" href="../index.html">← Back to Dashboard</a>

    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>GDT Pre-Filling System — Deploy Flow</h1>
      </div>
      <p class="subtitle">IDE → WEB-IWP → Docker → Browser verification</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1100 380">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- Step 1: Build -->
        <rect x="40" y="130" width="200" height="90" rx="10" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="140" y="158" fill="white" font-size="12" font-weight="700" text-anchor="middle">1. Build</text>
        <text x="140" y="176" fill="white" font-size="11" font-weight="600" text-anchor="middle">IDE / Maven</text>
        <text x="140" y="196" fill="#94a3b8" font-size="9" text-anchor="middle">mvn clean install</text>
        <text x="140" y="212" fill="#22d3ee" font-size="9" text-anchor="middle">Java 21</text>

        <!-- Step 2: Copy -->
        <rect x="300" y="130" width="200" height="90" rx="10" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="400" y="158" fill="white" font-size="12" font-weight="700" text-anchor="middle">2. Transfer</text>
        <text x="400" y="176" fill="white" font-size="11" font-weight="600" text-anchor="middle">SFTP / SCP</text>
        <text x="400" y="196" fill="#94a3b8" font-size="9" text-anchor="middle">Copy JAR to WEB-IWP</text>
        <text x="400" y="212" fill="#34d399" font-size="9" text-anchor="middle">/home/dkweb/deploy</text>

        <!-- Step 3: Docker -->
        <rect x="560" y="130" width="220" height="90" rx="10" fill="rgba(120, 53, 15, 0.35)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="670" y="158" fill="white" font-size="12" font-weight="700" text-anchor="middle">3. Containerize</text>
        <text x="670" y="176" fill="white" font-size="11" font-weight="600" text-anchor="middle">Docker on WEB-IWP</text>
        <text x="670" y="196" fill="#94a3b8" font-size="9" text-anchor="middle">docker run openjdk:21</text>
        <text x="670" y="212" fill="#fbbf24" font-size="9" text-anchor="middle">port 8080</text>

        <!-- Step 4: Verify -->
        <rect x="840" y="130" width="200" height="90" rx="10" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="940" y="158" fill="white" font-size="12" font-weight="700" text-anchor="middle">4. Verify</text>
        <text x="940" y="176" fill="white" font-size="11" font-weight="600" text-anchor="middle">Browser</text>
        <text x="940" y="196" fill="#94a3b8" font-size="9" text-anchor="middle">10.255.255.6:19002</text>
        <text x="940" y="212" fill="#22d3ee" font-size="9" text-anchor="middle">3298 / 3298</text>

        <!-- Success loop -->
        <path d="M 1040 80 L 1040 40 L 180 40 L 180 128" fill="none" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,5" marker-end="url(#arrowhead-success)"/>
        <text x="610" y="34" fill="#34d399" font-size="9" text-anchor="middle">success loop: rebuild and redeploy</text>

        <!-- Arrows -->
        <line x1="240" y1="175" x2="298" y2="175" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="270" y="169" fill="#94a3b8" font-size="9" text-anchor="middle">JAR</text>

        <line x1="500" y1="175" x2="558" y2="175" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="530" y="169" fill="#94a3b8" font-size="9" text-anchor="middle">docker run</text>

        <line x1="780" y1="175" x2="838" y2="175" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="810" y="169" fill="#94a3b8" font-size="9" text-anchor="middle">HTTP</text>

        <!-- Legend -->
        <text x="40" y="310" fill="white" font-size="10" font-weight="600">Legend</text>

        <rect x="40" y="318" width="14" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="60" y="326" fill="#94a3b8" font-size="9">Build / frontend zone</text>

        <rect x="180" y="318" width="14" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="200" y="326" fill="#94a3b8" font-size="9">Transfer / backend zone</text>

        <rect x="320" y="318" width="14" height="10" rx="2" fill="rgba(120, 53, 15, 0.35)" stroke="#fbbf24" stroke-width="1"/>
        <text x="340" y="326" fill="#94a3b8" font-size="9">Runtime / Docker</text>

        <line x1="480" y1="323" x2="496" y2="323" stroke="#34d399" stroke-width="1" stroke-dasharray="5,5"/>
        <text x="502" y="326" fill="#94a3b8" font-size="9">Success loop</text>
      </svg>
    </div>

    <p class="legend-note">This flow matches the deploy runbook in your wiki: build JAR in IDE, copy to WEB-IWP, run Docker, then verify at 10.255.255.6:19002.</p>
  </div>
</body>
</html>
