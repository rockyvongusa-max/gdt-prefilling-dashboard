<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDT Pre-Filling System — Server Topology</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15,23,42,0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; margin-bottom: 2rem; }
    svg { width: 100%; min-width: 1000px; display: block; }
    .nav-back { color: #38bdf8; text-decoration: none; font-size: 0.875rem; margin-bottom: 1rem; display: inline-block; }
    .nav-back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a class="nav-back" href="../index.html">← Back to Dashboard</a>
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>GDT Pre-Filling System — Server Topology</h1>
      </div>
      <p class="subtitle">Known web UI/dev hosts and the primary deploy target for the backend support web</p>
    </div>
    <div class="diagram-container">
      <svg viewBox="0 0 1000 420">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <rect x="40" y="110" width="240" height="100" rx="12" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="160" y="136" fill="white" font-size="12" font-weight="600" text-anchor="middle">Developer Workstation</text>
        <text x="160" y="154" fill="#94a3b8" font-size="9" text-anchor="middle">IntelliJ + terminal + Bitvise</text>
        <text x="160" y="172" fill="#22d3ee" font-size="9" text-anchor="middle">build -> copy -> verify</text>

        <rect x="360" y="60" width="260" height="120" rx="12" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="490" y="86" fill="white" font-size="12" font-weight="600" text-anchor="middle">Web UI Environment</text>
        <text x="490" y="104" fill="#94a3b8" font-size="9" text-anchor="middle">DEV environment hosts</text>
        <text x="490" y="122" fill="#94a3b8" font-size="9">10.255.255.2 - 10.255.255.4</text>

        <rect x="360" y="220" width="260" height="100" rx="12" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="490" y="246" fill="white" font-size="12" font-weight="600" text-anchor="middle">WEB-IWP</text>
        <text x="490" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">10.255.255.3:2232</text>
        <text x="490" y="282" fill="#fbbf24" font-size="9" text-anchor="middle">primary deploy target</text>

        <rect x="720" y="140" width="220" height="100" rx="12" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="830" y="166" fill="white" font-size="12" font-weight="600" text-anchor="middle">Verification / Test</text>
        <text x="830" y="184" fill="#94a3b8" font-size="9" text-anchor="middle">10.255.255.6:19002/login</text>
        <text x="830" y="202" fill="#a78bfa" font-size="9" text-anchor="middle">login: 3298</text>

        <line x1="280" y1="160" x2="358" y2="120" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="320" y="138" fill="#94a3b8" font-size="9" text-anchor="middle">ssh / scp</text>

        <line x1="490" y1="180" x2="490" y2="218" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="510" y="202" fill="#94a3b8" font-size="9">deploy target</text>

        <line x1="620" y1="270" x2="718" y2="190" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="670" y="224" fill="#94a3b8" font-size="9" text-anchor="middle">reachability</text>

        <text x="40" y="360" fill="white" font-size="10" font-weight="600">Host Summary</text>
        <rect x="40" y="370" width="920" height="40" rx="8" fill="rgba(30,41,59,0.15)" stroke="#64748b" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="80" y="394" fill="#94a3b8" font-size="10">WEB-EWP: 10.255.255.2 | WEB-IWP: 10.255.255.3 | WEB-OWP: 10.255.255.4</text>
      </svg>
    </div>
  </div>
</body>
</html>
